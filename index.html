<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Manage shared shelves for calendar, tasks, locations, trips, recipes, and watchlist">
  <meta name="theme-color" content="#E63B2E">
  <title>Shared Shelf - Homepage</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --app-bg: #E63B2E;
      --app-surface: #FFFFFF;
      --app-surface-soft: rgba(230, 59, 46, 0.10);
      --app-surface-warm: #FFF8F5;
      --app-surface-tint: #FBF2ED;
      --app-overlay: rgba(65, 0, 1, 0.62);
      --app-text: #241A18;
      --app-text-muted: rgba(36, 26, 24, 0.76);
      --app-text-subtle: rgba(36, 26, 24, 0.58);
      --app-title: #410001;
      --app-primary: #E63B2E;
      --app-primary-strong: #A9372C;
      --app-accent-cool: #8C4F45;
      --app-accent-bright: #FFB4A9;
      --app-accent-soft: rgba(230, 59, 46, 0.12);
      --app-accent-cool-soft: rgba(140, 79, 69, 0.14);
      --app-accent-warm-soft: rgba(251, 208, 119, 0.22);
      --app-border: #D8C2BE;
      --app-border-soft: rgba(133, 115, 112, 0.24);
      --app-border-faint: rgba(133, 115, 112, 0.12);
      --app-light-surface: #FFFFFF;
      --app-light-surface-hover: #FFF8F5;
      --app-on-light: #241A18;
      --app-on-accent: #FFFFFF;
      --app-on-bright: #410001;
      --app-danger: #B91C1C;
      --app-focus: #FFB4A9;
      color-scheme: light;
    }

    html {
      background: var(--app-surface-warm);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(230, 59, 46, 0.18);
      background:
        radial-gradient(circle at top left, rgba(255, 180, 169, 0.28), transparent 30%),
        radial-gradient(circle at top right, rgba(251, 208, 119, 0.20), transparent 28%),
        linear-gradient(135deg, #FFF8F5 0%, #FBF2ED 52%, #F5E7E2 100%);
      color: var(--app-text);
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #root {
      min-height: 100vh;
      background: transparent;
    }

    /* Ensure Leaflet map container has a defined height */
    .leaflet-container {
      height: 100%;
      width: 100%;
      background: #FFF8F5;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Epilogue', system-ui, sans-serif;
      color: var(--app-title) !important;
    }

    a {
      color: var(--app-title);
    }

    button,
    input,
    textarea,
    select,
    a {
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    a:focus-visible,
    [tabindex]:focus-visible {
      outline: 3px solid var(--app-focus);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(230, 59, 46, 0.14);
    }

    .skip-link {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 9999;
      transform: translateY(-150%);
      border-radius: 999px;
      background: #ffffff;
      color: var(--app-title);
      font-weight: 800;
      padding: 0.75rem 1rem;
      box-shadow: 0 18px 40px rgba(24, 16, 48, 0.24);
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    ::selection {
      background: var(--app-accent-bright);
      color: var(--app-on-bright);
    }

    [class*="bg-gradient-to-"] {
      background-image: linear-gradient(135deg, #A9372C 0%, #E63B2E 56%, #8C4F45 100%) !important;

      color: var(--app-on-accent) !important;

    .leaflet-popup-content-wrapper,

      box-shadow: 0 14px 34px rgba(3, 26, 107, 0.18);

        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"></script>

  <!-- ============================================ -->
  <!-- GLOBAL CONFIGURATION                          -->
  <!-- ============================================ -->
  <script>
    // Same-origin API calls: whichever deployment (production or preview)
    // serves this page also serves /api/*. Leaving this empty makes fetch
    // calls resolve relative to window.location.origin.
    window.API_BASE_URL = '';

    // TMDB API key (set this to your actual key or leave empty if using your backend)
    window.TMDB_API_KEY = '';

    window.loadLeafletAssets = (() => {
      let loadPromise;

      return () => {
        if (window.L) return Promise.resolve(window.L);
        if (loadPromise) return loadPromise;

        loadPromise = new Promise((resolve, reject) => {
          if (!document.querySelector('link[data-leaflet]')) {
            const leafletCss = document.createElement('link');
            leafletCss.rel = 'stylesheet';
            leafletCss.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            leafletCss.dataset.leaflet = 'true';
            document.head.appendChild(leafletCss);
          }

          const leafletScript = document.createElement('script');
          leafletScript.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
          leafletScript.async = true;
          leafletScript.onload = () => {
            window.L.Icon.Default.mergeOptions({
              iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
              iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
              shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            });
            resolve(window.L);
          };
          leafletScript.onerror = () => {
            loadPromise = null;
            reject(new Error('Failed to load map library'));
          };
          document.body.appendChild(leafletScript);
        });

        return loadPromise;
      };
    })();
  </script>

  <!-- ============================================ -->
  <!-- UTILITY SCRIPTS (load before components)      -->
  <!-- ============================================ -->
  <script type="text/babel" src="/utils/api.js"></script>
  <script type="text/babel" src="/utils/storage.js"></script>

  <!-- ============================================ -->
  <!-- APP COMPONENTS (load in dependency order)     -->
  <!-- ============================================ -->
  <script type="text/babel" src="/components/Config.jsx"></script>
  <script type="text/babel" src="/components/Icons.jsx"></script>
  <script type="text/babel" src="/components/UI.jsx"></script>
  <script type="text/babel" src="/components/MediaCard.jsx"></script>
  <script type="text/babel" src="/components/ProfileModal.jsx"></script>
  <script type="text/babel" src="/components/SearchModal.jsx"></script>
  <script type="text/babel" src="/components/GlobalSearchModal.jsx"></script>
  <script type="text/babel" src="/components/Header.jsx"></script>
  <script type="text/babel" src="/components/AddModal.jsx"></script>
  <script type="text/babel" src="/components/CalendarView.jsx"></script>
  <script type="text/babel" src="/components/TripsView.jsx"></script>
  <script type="text/babel" src="/components/RecipesView.jsx"></script>
  <script type="text/babel" src="/components/DatesView.jsx"></script>
  <script type="text/babel" src="/components/TasksView.jsx"></script>
  <script type="text/babel" src="/components/MediaSectionsView.jsx"></script>
  <script type="text/babel" src="/components/Login.jsx"></script>
  <script type="text/babel" src="/components/ShelfSelector.jsx"></script>
  <script type="text/babel" src="/components/JoinShelfModal.jsx"></script>
  <script type="text/babel" src="/components/ShareShelfModal.jsx"></script>

  <!-- ============================================ -->
  <!-- MAIN APP                                      -->
  <!-- ============================================ -->
  <script type="text/babel" src="/media-tracker.jsx"></script>

  <script>
    const renderSharedShelf = () => {
      if (typeof MediaTracker === 'undefined') {
        return false;
      }
      const { createRoot } = ReactDOM;
      const root = createRoot(document.getElementById('root'));
      root.render(React.createElement(MediaTracker));
      return true;
    };

    const waitForApp = (startedAt = performance.now()) => {
      if (renderSharedShelf()) return;
      if (performance.now() - startedAt > 3000) {
        console.error('MediaTracker component not found - check that all scripts loaded correctly');
        document.getElementById('root').innerHTML = '<div style="color:white;text-align:center;padding:2rem;">Failed to load application. Please check the console for errors.</div>';
        return;
      }
      requestAnimationFrame(() => waitForApp(startedAt));
    };

    waitForApp();
  </script>
</body>
</html>
