  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      /* Warm red editorial palette */
      --app-primary: #E63B2E;
      --app-primary-strong: #A9372C;
      --app-primary-deep: #410001;
      --app-primary-soft: #FFDAD4;
      --app-primary-tint: #FFF8F5;

      --app-surface: #FFF8F5;
      --app-surface-warm: #FFF8F5;
      --app-surface-tint: #FBF2ED;
      --app-surface-card: #FFFFFF;
      --app-surface-card-hover: #FFF8F5;
      --app-surface-soft: #F5E7E2;

      --app-text: #241A18;
      --app-text-strong: #410001;
      --app-text-muted: #534340;
      --app-text-subtle: #857370;
      --app-text-faint: #A89A95;

      --app-border: #E1D8D4;
      --app-border-strong: #D8C2BE;
      --app-border-soft: rgba(133, 115, 112, 0.18);

      --app-on-primary: #FFFFFF;
      --app-on-light: #241A18;
      --app-overlay: rgba(36, 26, 24, 0.55);
      --app-focus: #FFB4A9;
      --app-danger: #C1121F;
      --app-success: #2F855A;

      --app-shadow-sm: 0 2px 8px rgba(230, 59, 46, 0.04);
      --app-shadow-md: 0 8px 24px rgba(230, 59, 46, 0.10);
      --app-shadow-lg: 0 18px 36px rgba(65, 0, 1, 0.14);

      color-scheme: light;
    }

    html {
      background: var(--app-surface-tint);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(230, 59, 46, 0.18);
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 180, 169, 0.18), transparent 35%),
        radial-gradient(circle at 100% 0%, rgba(251, 208, 119, 0.10), transparent 30%),
        linear-gradient(180deg, #FFF8F5 0%, #FBF2ED 100%);
      color: var(--app-text);
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
      background: transparent;
    }

    /* Leaflet map container */
    .leaflet-container {
      height: 100%;
      width: 100%;
      background: var(--app-surface);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Epilogue', system-ui, sans-serif;
      color: var(--app-text-strong);
      letter-spacing: -0.01em;
    }

    a {
      color: var(--app-primary);
    }

    a:hover {
      color: var(--app-primary-strong);
    }

    button,
    input,
    textarea,
    select,
    a {
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    a:focus-visible,
    [tabindex]:focus-visible {
      outline: 3px solid var(--app-focus);
      outline-offset: 2px;
      box-shadow: 0 0 0 5px rgba(230, 59, 46, 0.14);
    }

    .skip-link {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 9999;
      transform: translateY(-150%);
      border-radius: 999px;
      background: var(--app-surface-card);
      color: var(--app-text-strong);
      font-weight: 700;
      padding: 0.75rem 1rem;
      box-shadow: var(--app-shadow-lg);
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    ::selection {
      background: var(--app-primary-soft);
      color: var(--app-primary-deep);
    }

    /* Auth gradient backgrounds */
    .app-auth-bg {
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 180, 169, 0.45), transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(140, 79, 69, 0.35), transparent 45%),
        linear-gradient(135deg, #A9372C 0%, #E63B2E 55%, #8C4F45 100%);
    }

    /* Inputs */
    input,
    textarea,
    select {
      caret-color: var(--app-text);
      color-scheme: light;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--app-text-subtle);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 248, 245, 0.6);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(230, 59, 46, 0.45);
      border-radius: 6px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(169, 55, 44, 0.7);
      background-clip: padding-box;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.35s ease-out; }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }

    /* Native date/time inputs */
    input[type="time"],
    input[type="date"] {
      color-scheme: light;
    }
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.7;
      cursor: pointer;
    }

    /* Leaflet popup styling */
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: var(--app-surface-card);
      color: var(--app-on-light);
      box-shadow: var(--app-shadow-md);
    }

    .leaflet-popup-content,
    .leaflet-popup-content strong,
    .leaflet-popup-content span {
      color: var(--app-on-light);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Utility classes for the warm-red theme */
    .ss-card {
      background: var(--app-surface-card);
      border: 1px solid var(--app-border);
      border-radius: 1rem;
      box-shadow: var(--app-shadow-sm);
    }

    .ss-card-hover:hover {
      border-color: var(--app-primary);
      box-shadow: var(--app-shadow-md);
      transform: translateY(-1px);
    }

    .ss-btn-primary {
      background: var(--app-primary);
      color: var(--app-on-primary);
      border-radius: 0.75rem;
      font-weight: 600;
      transition: background 160ms ease, box-shadow 160ms ease;
    }
    .ss-btn-primary:hover {
      background: var(--app-primary-strong);
      box-shadow: 0 8px 20px rgba(230, 59, 46, 0.28);
    }
    .ss-btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .ss-btn-secondary {
      background: var(--app-surface-card);
      color: var(--app-text-strong);
      border: 1px solid var(--app-border);
      border-radius: 0.75rem;
      font-weight: 600;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .ss-btn-secondary:hover {
      background: var(--app-surface-tint);
      border-color: var(--app-primary);
    }

    .ss-input {
      width: 100%;
      background: var(--app-surface-card);
      border: 1px solid var(--app-border);
      border-radius: 0.75rem;
      color: var(--app-text);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }
    .ss-input:focus {
      outline: none;
      border-color: var(--app-primary);
      box-shadow: 0 0 0 3px rgba(255, 180, 169, 0.5);
    }
    .ss-input:disabled {
      background: var(--app-surface-tint);
      cursor: not-allowed;
    }

    .ss-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--app-primary-soft);
      color: var(--app-primary-deep);
    }

    /* Backwards-compat: tame leftover dark Tailwind classes if any slip through */
    [class~="bg-slate-900"],
    [class~="bg-slate-900/30"],
    [class~="bg-slate-900/50"],
    [class~="bg-slate-900/60"],
    [class~="bg-slate-900/80"],
    [class~="bg-slate-800"],
    [class~="bg-slate-800/50"],
    [class~="bg-slate-800/70"] {
      background-color: var(--app-surface-card) !important;
      color: var(--app-on-light) !important;
    }

    [class~="bg-slate-800"] [class~="text-white"],
    [class~="bg-slate-900"] [class~="text-white"],
    [class~="bg-slate-900/50"] [class~="text-white"],
    [class~="bg-slate-800/50"] [class~="text-white"] {
      color: var(--app-text-strong) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"></script>

  <!-- ============================================ -->
  <!-- GLOBAL CONFIGURATION                          -->
  <!-- ============================================ -->
  <script>
    window.API_BASE_URL = '';
    window.TMDB_API_KEY = '';

    window.loadLeafletAssets = (() => {
      let loadPromise;

      return () => {
        if (window.L) return Promise.resolve(window.L);
        if (loadPromise) return loadPromise;

        loadPromise = new Promise((resolve, reject) => {
          if (!document.querySelector('link[data-leaflet]')) {
            const leafletCss = document.createElement('link');
            leafletCss.rel = 'stylesheet';
            leafletCss.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            leafletCss.dataset.leaflet = 'true';
            document.head.appendChild(leafletCss);
          }

          const leafletScript = document.createElement('script');
          leafletScript.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
          leafletScript.async = true;
          leafletScript.onload = () => {
            window.L.Icon.Default.mergeOptions({
              iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
              iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
              shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            });
            resolve(window.L);
          };
          leafletScript.onerror = () => {
            loadPromise = null;
            reject(new Error('Failed to load map library'));
          };
          document.body.appendChild(leafletScript);
        });

        return loadPromise;
      };
    })();
  </script>

  <!-- ============================================ -->
  <!-- UTILITY SCRIPTS (load before components)      -->
  <!-- ============================================ -->
  <script type="text/babel" src="/utils/api.js"></script>

  <!-- ============================================ -->
  <!-- APP COMPONENTS (load in dependency order)     -->
  <!-- ============================================ -->
  <script type="text/babel" src="/components/Config.jsx"></script>
  <script type="text/babel" src="/components/Brand.jsx"></script>

  <script type="text/babel" src="/components/TripsView.jsx"></script>

  <!-- ============================================ -->
  <!-- MAIN APP                                      -->
  <!-- ============================================ -->
  <script type="text/babel" src="/media-tracker.jsx"></script>

  <script>
    const renderCouplePlanner = () => {
      if (typeof MediaTracker === 'undefined') {
        return false;
      }
      const { createRoot } = ReactDOM;
      const root = createRoot(document.getElementById('root'));
      const app = typeof AppErrorBoundary === 'function'
        ? React.createElement(AppErrorBoundary, null, React.createElement(MediaTracker))
        : React.createElement(MediaTracker);
      root.render(app);
      return true;
    };

    const waitForApp = (startedAt = performance.now()) => {
      if (renderCouplePlanner()) return;
      if (performance.now() - startedAt > 3000) {
        console.error('MediaTracker component not found - check that all scripts loaded correctly');
        document.getElementById('root').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FBF2ED;padding:1rem;"><section style="max-width:36rem;border:1px solid #E1D8D4;background:#FFFFFF;border-radius:1rem;padding:2rem;text-align:center;box-shadow:0 18px 36px rgba(65,0,1,0.14);"><p style="margin:0 0 .75rem;color:#A9372C;font:800 .75rem Manrope,system-ui;text-transform:uppercase;letter-spacing:.16em;">App error</p><h1 style="margin:0;color:#410001;font:800 2rem Epilogue,system-ui;">Couple Planner could not start</h1><p style="margin:1rem 0 1.5rem;color:#534340;font:500 1rem Manrope,system-ui;line-height:1.6;">Refresh the page, or head back to the homepage and try again.</p><a href="/" style="display:inline-flex;border-radius:.75rem;background:#E63B2E;color:#fff;padding:.85rem 1.25rem;text-decoration:none;font:800 .9rem Manrope,system-ui;">Go home</a></section></div>';
        return;
      }
      requestAnimationFrame(() => waitForApp(startedAt));
    };

    waitForApp();
  </script>
</body>
