<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shared Shelf - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;900&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E63B2E",
                        "primary-container": "#FFDAD4",
                        "on-primary": "#FFFFFF",
                        "on-primary-container": "#410001",
                        "secondary": "#775651",
                        "secondary-container": "#FFDAD4",
                        "on-secondary": "#FFFFFF",
                        "on-secondary-container": "#2C1512",
                        "tertiary": "#705C2E",
                        "tertiary-container": "#FCDFA6",
                        "on-tertiary": "#FFFFFF",
                        "on-tertiary-container": "#251A00",
                        "error": "#BA1A1A",
                        "error-container": "#FFDAD6",
                        "on-error": "#FFFFFF",
                        "on-error-container": "#410002",
                        "background": "#FFF8F5",
                        "on-background": "#231A19",
                        "surface": "#FFF8F5",
                        "on-surface": "#231A19",
                        "surface-variant": "#F5DDD8",
                        "on-surface-variant": "#534341",
                        "outline": "#857370",
                        "outline-variant": "#D8C2BE",
                        "inverse-surface": "#392E2D",
                        "inverse-on-surface": "#FFEDE9",
                        "inverse-primary": "#FFB4A8",
                        "surface-dim": "#E1D8D4",
                        "surface-bright": "#FFF8F5",
                        "surface-container-lowest": "#FFFFFF",
                        "surface-container-low": "#FBF2ED",
                        "surface-container": "#F5EDE9",
                        "surface-container-high": "#EFE7E3",
                        "surface-container-highest": "#E9E1DD"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "3xl": "1.5rem"
                    },
                    spacing: {
                        "gutter": "24px",
                        "container-max": "1280px",
                        "xl": "80px",
                        "lg": "48px",
                        "sm": "12px",
                        "base": "8px",
                        "xs": "4px",
                        "md": "24px"
                    },
                    fontFamily: {
                        "headline-md": ["Epilogue"],
                        "label-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg": ["Epilogue"],
                        "body-sm": ["Manrope"],
                        "headline-xl": ["Epilogue"],
                        "body-md": ["Manrope"]
                    },
                    fontSize: {
                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="min-h-screen w-full bg-gradient-to-br from-primary to-[#8C231B] flex items-center justify-center p-6 relative overflow-hidden font-body-md text-body-md text-on-surface antialiased">
<!-- Decorative Background Orbs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary-container mix-blend-multiply filter blur-[100px] opacity-40"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] rounded-full bg-tertiary-container mix-blend-multiply filter blur-[100px] opacity-30"></div>
<!-- Main Authentication Panel -->
<main class="w-full max-w-[400px] bg-surface/95 backdrop-blur-2xl rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.15)] border border-white/40 relative z-10 overflow-hidden flex flex-col">
<div class="px-8 pt-10 pb-8 flex flex-col items-center">
<!-- Brand Logo -->
<h1 class="font-headline-xl text-headline-xl bg-gradient-to-r from-primary to-tertiary bg-clip-text text-transparent mb-8">
                Shared Shelf
            </h1>
<!-- Tab Navigation -->
<div class="w-full flex bg-surface-container-high/50 p-1 rounded-xl mb-8">
<button class="flex-1 py-3 text-center rounded-lg bg-surface shadow-sm font-label-md text-label-md text-primary transition-all">
                    Sign In
                </button>
<button class="flex-1 py-3 text-center rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-all">
                    Register
                </button>
</div>
<!-- Login Form -->
<form class="w-full flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface ml-1" for="email">Email or Username</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary-container/50 transition-all" id="email" placeholder="you@example.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary-container/50 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Utility Row -->
<div class="flex items-center justify-between mt-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary-container focus:ring-offset-0 bg-surface-container-lowest cursor-pointer transition-colors" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-tertiary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full mt-2 py-4 rounded-xl bg-primary text-on-primary font-label-md text-label-md shadow-[0_8px_20px_rgba(230,59,46,0.25)] hover:bg-[#D42B20] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="arrow_forward" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
</div>
</main>
</body></html>
